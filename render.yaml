services:
  - type: web
    name: grocery-pos-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://grocery-pos-frontend.onrender.com

  - type: web
    name: grocery-pos-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://grocery-pos-backend.onrender.com
